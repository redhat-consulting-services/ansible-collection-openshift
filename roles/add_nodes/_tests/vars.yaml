generate_iso: true
additional_ntp_sources:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
worker:
  dns_resolvers:
    - 10.10.10.2
    - fd2e:6f44:5dd8::2
  routes:
    - destination: 0.0.0.0/0
      gateway: 10.10.10.1
      interface: bond0.100
      table_id: 254
    - destination: ::/0
      gateway: fd2e:6f44:5dd8::1
      interface: bond0.100
      table_id: 254
  bonds:
    - name: bond0
      mode: 802.3ad
      options:
        miimon: "100"
  #bridges:
  #  - name: br0
  #    type: ovs-bridge
  #    interfaces:
  #      - name: bond0.100
  vlans:
    - name: bond0.100
      id: 100
      base_interface: bond0
  hosts:
    - hostname: worker-1.ocp4-test.example.com
      root_device:
        name: "/dev/sda"
      interfaces:
        - name: eth0
          mac_address: "00:aa:aa:aa:aa:01"
          part_of_bond: "bond0"
        - name: eth1
          mac_address: "00:aa:aa:aa:aa:02"
          part_of_bond: "bond0"
      bonds:
        - interface: bond0
      #bridges:
      #  - interface: br0
      vlans:
        - interface: bond0.100
          ipv4_dhcp: false
          ipv6_dhcp: false
          addresses:
            - ip: 10.10.10.10
              subnet_length: 24
            - ip: fd2e:6f44:5dd8::10
              subnet_length: 64
    - hostname: worker-2.ocp4-test.example.com
      root_device:
        name: "/dev/sda"
      interfaces:
        - name: eth0
          mac_address: "00:aa:aa:aa:ab:01"
          part_of_bond: "bond0"
        - name: eth1
          mac_address: "00:aa:aa:aa:ab:02"
          part_of_bond: "bond0"
      bonds:
        - interface: bond0
      #bridges:
      #  - interface: br0
      vlans:
        - interface: bond0.100
          ipv4_dhcp: false
          ipv6_dhcp: false
          addresses:
            - ip: 10.10.10.11
              subnet_length: 24
            - ip: fd2e:6f44:5dd8::11
              subnet_length: 64
    - hostname: worker-3.ocp4-test.example.com
      root_device:
        name: "/dev/sda"
      interfaces:
        - name: eth0
          mac_address: "00:aa:aa:aa:ac:01"
          part_of_bond: "bond0"
        - name: eth1
          mac_address: "00:aa:aa:aa:ac:02"
          part_of_bond: "bond0"
      bonds:
        - interface: bond0
      #bridges:
      #  - interface: br0
      vlans:
        - interface: bond0.100
          ipv4_dhcp: false
          ipv6_dhcp: false
          addresses:
            - ip: 10.10.10.12
              subnet_length: 24
            - ip: fd2e:6f44:5dd8::12
              subnet_length: 64
